name: Publish Crates

# Manual-only. This workspace is distributed as binary-only via dist.yml +
# install.sh; every member sets `publish = false` because the workspace
# depends on unpublished sibling path crates (frankensqlite, fastmcp_rust,
# asupersync, frankensearch, sqlmodel_rust). Auto-publishing on push/tag
# was structurally broken — `cargo publish --dry-run` cannot resolve the
# path deps from crates.io — so it has been removed. Keep workflow_dispatch
# so the maintainer can manually preflight (and eventually publish) once
# every sibling crate is on crates.io.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preflight only (dry-run). Set to false to attempt real publish — currently expected to fail until sibling path deps are on crates.io."
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish workspace crates to crates.io
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify dispatch context
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "workflow_dispatch must run from main (got: $GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Determine publish mode
        id: mode
        shell: bash
        run: |
          set -euo pipefail
          DRY_RUN="$(jq -r '.inputs.dry_run // "true"' "$GITHUB_EVENT_PATH")"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "mode=dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "mode=publish" >> "$GITHUB_OUTPUT"
          fi
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

      - name: Preflight publishability summary
        id: preflight
        shell: bash
        run: |
          set -euo pipefail

          : > /tmp/publishable.txt
          : > /tmp/unpublishable.txt

          {
            echo "## Workspace publishability"
            echo ""
            echo "| Member | \`publish\` | Notes |"
            echo "|---|---|---|"
          } >> "$GITHUB_STEP_SUMMARY"

          cargo metadata --format-version 1 --no-deps > /tmp/meta.json

          # publish field: null/true => publishable (default), false (as `[]`) => not publishable
          jq -r '.packages[] | [.name, (.publish // "null" | tostring)] | @tsv' /tmp/meta.json \
            | while IFS=$'\t' read -r name pub; do
                case "$pub" in
                  "null"|"true")
                    echo "$name" >> /tmp/publishable.txt
                    echo "| \`$name\` | (default = publishable) | path deps to unpublished siblings will still fail \`cargo publish\` |" >> "$GITHUB_STEP_SUMMARY"
                    ;;
                  "[]"|"false")
                    echo "$name" >> /tmp/unpublishable.txt
                    echo "| \`$name\` | \`publish = false\` | intentionally not for crates.io |" >> "$GITHUB_STEP_SUMMARY"
                    ;;
                  *)
                    echo "$name" >> /tmp/unpublishable.txt
                    echo "| \`$name\` | \`$pub\` | restricted registry — skipping |" >> "$GITHUB_STEP_SUMMARY"
                    ;;
                esac
              done

          {
            echo ""
            echo "### Path-dep override summary"
            echo ""
            echo "Root \`Cargo.toml\` has the following \`[patch.crates-io]\` entries pointing at sibling repos. While any of these are path-only (no published version on crates.io), \`cargo publish\` cannot succeed for crates that transitively depend on them."
            echo ""
            echo '```toml'
            awk '/^\[patch\.crates-io\]/{flag=1; next} /^\[/{flag=0} flag' Cargo.toml || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          publishable_count=$(wc -l < /tmp/publishable.txt | tr -d ' ')
          unpublishable_count=$(wc -l < /tmp/unpublishable.txt | tr -d ' ')
          echo "publishable_count=$publishable_count" >> "$GITHUB_OUTPUT"
          echo "unpublishable_count=$unpublishable_count" >> "$GITHUB_OUTPUT"

          {
            echo ""
            echo "**$publishable_count publishable, $unpublishable_count not publishable.**"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight cargo publish --dry-run (publishable members only)
        if: steps.preflight.outputs.publishable_count != '0'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo ""
            echo "### \`cargo publish --dry-run\` preflight"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          status=0
          while read -r crate; do
            [[ -z "$crate" ]] && continue
            echo "::group::Preflight: $crate"
            set +e
            out="$(cargo publish -p "$crate" --locked --dry-run 2>&1)"
            rc=$?
            set -e
            echo "$out"
            echo "::endgroup::"

            if [[ $rc -eq 0 ]]; then
              echo "- \`$crate\`: dry-run **OK**" >> "$GITHUB_STEP_SUMMARY"
            else
              status=1
              echo "- \`$crate\`: dry-run **FAILED** (rc=$rc)" >> "$GITHUB_STEP_SUMMARY"
              echo '  <details><summary>last 5 lines</summary>' >> "$GITHUB_STEP_SUMMARY"
              echo '' >> "$GITHUB_STEP_SUMMARY"
              echo '  ```' >> "$GITHUB_STEP_SUMMARY"
              echo "$out" | tail -5 | sed 's/^/  /' >> "$GITHUB_STEP_SUMMARY"
              echo '  ```' >> "$GITHUB_STEP_SUMMARY"
              echo '  </details>' >> "$GITHUB_STEP_SUMMARY"
            fi
          done < /tmp/publishable.txt

          if [[ "${{ steps.mode.outputs.mode }}" == "dry-run" ]]; then
            # In dry-run mode, surface preflight failures but do not fail the job
            # (the maintainer ran this manually to see the report).
            exit 0
          fi

          exit $status

      - name: Publish crates to crates.io
        if: steps.mode.outputs.mode == 'publish' && steps.preflight.outputs.publishable_count != '0'
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is required for publish mode"
            exit 1
          fi

          publish_with_retry() {
            local crate="$1"
            local attempt

            for attempt in 1 2 3; do
              echo "Publishing $crate (attempt $attempt/3)"
              set +e
              output="$(cargo publish -p "$crate" --locked 2>&1)"
              status=$?
              set -e
              echo "$output"

              if [[ $status -eq 0 ]]; then
                return 0
              fi

              if grep -qi "already uploaded" <<<"$output"; then
                echo "Crate $crate already uploaded; continuing."
                return 0
              fi

              if [[ $attempt -lt 3 ]]; then
                sleep $((attempt * 20))
              fi
            done

            echo "Failed to publish $crate after retries"
            return 1
          }

          while read -r crate; do
            [[ -z "$crate" ]] && continue
            publish_with_retry "$crate"
            sleep 15
          done < /tmp/publishable.txt

      - name: Nothing to publish
        if: steps.preflight.outputs.publishable_count == '0'
        shell: bash
        run: |
          {
            echo ""
            echo "### Result"
            echo ""
            echo "No workspace members are currently publishable (all set \`publish = false\`). This is by design — see the workflow header for context."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "No publishable members; nothing to do."
