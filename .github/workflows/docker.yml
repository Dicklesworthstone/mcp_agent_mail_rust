# Build + publish a multi-arch container image to ghcr.io.
#
# Triggers
# --------
#   push tag v*          — tagged releases (matches dist.yml). Publishes
#                          :<tag>, :latest, and the SemVer aliases.
#   workflow_dispatch    — manual builds (e.g. between releases). The
#                          dispatch form accepts inputs.am_ref and
#                          inputs.sibling_ref so users can rebuild from any
#                          commit without cutting a release.
#
# The Dockerfile clones the source tree itself (via the AM_REF build arg),
# so the workflow does not need to checkout the repo for the image to match
# a specific commit. We still run a checkout step so docker/build-push-action
# can find the Dockerfile in the workspace.
name: docker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      am_ref:
        description: 'Git ref of mcp_agent_mail_rust to build (tag, branch, or full 40-char SHA — short SHAs are not accepted by GitHub upload-pack).'
        required: false
        default: 'main'
      sibling_ref:
        description: 'Git ref for sibling deps (frankensearch, asupersync, ...) — tag, branch, or full 40-char SHA only.'
        required: false
        default: 'main'
      tag_suffix:
        description: 'Extra image tag to push (in addition to :sha-<short>).'
        required: false
        default: 'manual'

# Cancel an in-progress workflow only for non-tag refs. We never want to
# cancel a release build mid-flight because that could leave the image
# registry inconsistent with the GitHub Release artifacts.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Minimal default permissions; jobs request what they need.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Image path is forced lowercase because the GitHub repository slug
  # contains a mixed-case owner ("Dicklesworthstone") but OCI registries
  # require lowercase image names.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare image metadata
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      am_ref: ${{ steps.refs.outputs.am_ref }}
      sibling_ref: ${{ steps.refs.outputs.sibling_ref }}
      sibling_fallback_ref: ${{ steps.refs.outputs.sibling_fallback_ref }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
    permissions:
      contents: read

    steps:
      - name: Checkout (Dockerfile + workflow only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Lowercase image name
        id: image
        env:
          RAW_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          lowered="${RAW_IMAGE,,}"
          printf 'image=%s\n' "$lowered" >> "$GITHUB_OUTPUT"

      - name: Resolve build refs
        id: refs
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_AM_REF: ${{ inputs.am_ref }}
          INPUT_SIBLING_REF: ${{ inputs.sibling_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Tag pushes build the project tag and first try matching sibling tags.
          # The Dockerfile falls back per sibling when that repo has no such tag.
          if [ "$EVENT_NAME" = "push" ]; then
            am_ref="$REF_NAME"
            sibling_ref="$REF_NAME"
          else
            am_ref="${INPUT_AM_REF:-main}"
            sibling_ref="${INPUT_SIBLING_REF:-main}"
          fi
          {
            printf 'am_ref=%s\n' "$am_ref"
            printf 'sibling_ref=%s\n' "$sibling_ref"
            printf 'sibling_fallback_ref=%s\n' "main"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
        with:
          images: ${{ steps.image.outputs.image }}
          # Tag strategy:
          #   stable tag (vX.Y.Z) → :v0.3.6, :0.3.6, :0.3, :latest
          #   pre-release (vX.Y.Z-rc1, -beta, ...) → :v0.3.6-rc1, :0.3.6-rc1
          #     (NO :latest, NO :{major.minor} — those should only ever point
          #      at stable releases to avoid surprising `:latest` consumers.)
          #   manual run → :manual-<short>, :sha-<short>
          tags: |
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
            type=raw,value=${{ inputs.tag_suffix }}-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha,format=short,prefix=sha-

  build:
    name: Build ${{ matrix.platform }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            cache_scope: linux-amd64
            artifact: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            cache_scope: linux-arm64
            artifact: linux-arm64

    steps:
      - name: Checkout (Dockerfile + workflow only)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ needs.prepare.outputs.labels }}
          outputs: type=image,name=${{ needs.prepare.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-${{ github.workflow }}-${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=docker-${{ github.workflow }}-${{ matrix.cache_scope }}
          build-args: |
            AM_REF=${{ needs.prepare.outputs.am_ref }}
            SIBLING_REF=${{ needs.prepare.outputs.sibling_ref }}
            SIBLING_FALLBACK_REF=${{ needs.prepare.outputs.sibling_fallback_ref }}
          provenance: true
          sbom: true

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/digests"
          # shellcheck disable=SC2153
          digest="${DIGEST#sha256:}"
          test -n "$digest"
          touch "$RUNNER_TEMP/digests/$digest"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.artifact }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Publish multi-arch manifest
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create and push manifest list
        id: manifest
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          TAGS: ${{ needs.prepare.outputs.tags }}
          DIGEST_DIR: ${{ runner.temp }}/digests
        run: |
          set -euo pipefail
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_args+=(--tag "$tag")
          done <<< "$TAGS"
          if [ "${#tag_args[@]}" -eq 0 ]; then
            echo "metadata-action produced no image tags" >&2
            exit 1
          fi

          sources=()
          while IFS= read -r digest_file; do
            digest="$(basename "$digest_file")"
            sources+=("$IMAGE@sha256:$digest")
          done < <(find "$DIGEST_DIR" -type f | sort)
          if [ "${#sources[@]}" -eq 0 ]; then
            echo "no platform digests downloaded" >&2
            exit 1
          fi

          metadata_file="${RUNNER_TEMP:?}/imagetools-metadata.json"
          docker buildx imagetools create --metadata-file "$metadata_file" "${tag_args[@]}" "${sources[@]}"
          first_tag="${tag_args[1]}"
          digest="$(jq -r '."containerimage.descriptor".digest // empty' "$metadata_file")"
          test -n "$digest"
          printf 'digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
          printf 'first_tag=%s\n' "$first_tag" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        if: ${{ steps.manifest.outputs.digest != '' }}
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a  # v3.0.0
        with:
          subject-name: ${{ needs.prepare.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Print published image references
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
          TAGS: ${{ needs.prepare.outputs.tags }}
        run: |
          set -euo pipefail
          printf 'Published image: %s@%s\n' "$IMAGE" "$DIGEST"
          printf 'Tags:\n%s\n' "$TAGS"
