name: Archive Perf Gate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

concurrency:
  group: archive-perf-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  archive-perf-gate:
    name: Archive Perf Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GATE_OUTPUT_DIR: tests/artifacts/perf/archive_perf_gate/${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Run archive perf gate
        id: gate
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/bench_archive_perf_gate.sh
          scripts/bench_archive_perf_gate.sh --output-dir "${GATE_OUTPUT_DIR}"

      - name: Upload archive perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: archive-perf-gate
          path: ${{ env.GATE_OUTPUT_DIR }}/
          retention-days: 30
          if-no-files-found: error

      - name: Upsert PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMMENT_PATH: ${{ env.GATE_OUTPUT_DIR }}/comment.md
        with:
          script: |
            const fs = require("fs");
            const path = process.env.COMMENT_PATH;
            const body = fs.readFileSync(path, "utf8");
            const marker = "<!-- archive-perf-gate -->";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce archive perf verdict
        if: always()
        shell: bash
        env:
          SUMMARY_PATH: ${{ env.GATE_OUTPUT_DIR }}/summary.json
          EVENT_PATH: ${{ github.event_path }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import json
          import os
          import pathlib
          import sys

          summary = json.loads(pathlib.Path(os.environ["SUMMARY_PATH"]).read_text(encoding="utf-8"))
          event = json.loads(pathlib.Path(os.environ["EVENT_PATH"]).read_text(encoding="utf-8"))
          labels = {
              label["name"]
              for label in event.get("pull_request", {}).get("labels", [])
              if isinstance(label, dict) and "name" in label
          }

          status = summary.get("status", "runtime_error")
          acknowledged = "perf-regression-acknowledged" in labels

          if status == "pass":
              print("Archive perf gate passed.")
              sys.exit(0)

          if status == "regression" and acknowledged:
              print("Archive perf regression acknowledged via label; leaving workflow green.")
              sys.exit(0)

          print(f"Archive perf gate failed with status={status}.")
          sys.exit(1)
          PY
